version: '3.8'

services:
  attendance_middleware:
    build: .
    container_name: attendance_middleware
    restart: always
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.attendance.rule=Host(`attendance.hartonomotor-group.com`)"
      - "traefik.http.routers.attendance.entrypoints=websecure"
      - "traefik.http.routers.attendance.tls.certresolver=myresolver"
      - "traefik.http.services.attendance.loadbalancer.server.port=8999"
    ports:
      - "8999:8999"
    volumes:
      - ./data:/app/data
    environment:
      - TZ=Asia/Jakarta
      # Generate with: openssl rand -hex 32
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-CHANGE_THIS_IN_PRODUCTION}
      - DATABASE_URL=postgresql://attendance:secret_db_password@attendance_db:5432/attendance_db
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      attendance_db:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8999/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  attendance_db:
    image: postgres:15-alpine
    container_name: attendance_db
    restart: always
    environment:
      - POSTGRES_USER=attendance
      - POSTGRES_PASSWORD=secret_db_password
      - POSTGRES_DB=attendance_db
    volumes:
      - ./pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U attendance -d attendance_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: attendance_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - default

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: attendance_worker
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      attendance_db:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://attendance:secret_db_password@attendance_db:5432/attendance_db
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - ENV=${ENV:-development}
      - TZ=Asia/Jakarta
    networks:
      - default

volumes:
  redis_data:
