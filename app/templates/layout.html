<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Virtual Attendance{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="/static/css/styles.css">
    {% block extra_css %}{% endblock %}
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <i class="ph-fill ph-fingerprint logo-icon"></i>
                <div class="logo-text">Virtual<br>Attendance</div>
            </div>
            
            <nav class="sidebar-nav">
                <!-- Navigation items will be injected or handled by JS/templating depending on active page -->
                <!-- We will manage the active states in index.html, but let's provide a structure -->
                <a href="#dashboard" class="nav-item active" data-tab="dashboard">
                    <i class="ph ph-squares-four"></i> Overview
                </a>
                <a href="#devices" class="nav-item" data-tab="devices">
                    <i class="ph ph-devices"></i> Devices
                </a>
                <a href="#security" class="nav-item" data-tab="security">
                    <i class="ph ph-key"></i> API Keys
                </a>
                <a href="#geofence" class="nav-item" data-tab="geofence">
                    <i class="ph ph-map-pin"></i> Branches
                </a>
                <a href="#settings" class="nav-item" data-tab="settings">
                    <i class="ph ph-gear"></i> ADMS Config
                </a>
                <a href="#profile" class="nav-item" data-tab="profile">
                    <i class="ph ph-users"></i> Users
                </a>
            </nav>

            <div class="sidebar-footer">
                <a href="/logout" class="nav-item text-danger" style="color: var(--danger); margin-bottom: 1rem;">
                    <i class="ph ph-sign-out"></i> Logout
                </a>
                <div class="version-badge">Middleware v1.0</div>
            </div>
        </aside>

        <!-- Main Content -->
        <div class="main-wrapper">
            <header class="top-header">
                <div class="header-title" id="page-title">Dashboard Overview</div>
                <div class="header-actions">
                    <div class="admin-profile">
                        <i class="ph-fill ph-user-circle"></i>
                        <span>Admin</span>
                    </div>
                </div>
            </header>

            <main class="content-area">
                {% block content %}{% endblock %}
            </main>
        </div>
    </div>

    <script>
        // Simple notification helper
        function notify(message, type = 'success') {
            const toast = document.createElement('div');
            toast.style.position = 'fixed';
            toast.style.bottom = '20px';
            toast.style.right = '20px';
            toast.style.padding = '10px 20px';
            toast.style.borderRadius = '5px';
            toast.style.color = 'white';
            toast.style.background = type === 'success' ? '#10b981' : '#ef4444';
            toast.style.zIndex = '1000';
            toast.innerText = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
    </script>
    {% block extra_js %}{% endblock %}
</body>
</html>
