<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Virtual Attendance{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <!-- Leaflet (Interactive Map) -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <!-- QRCode.js -->
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <link rel="stylesheet" href="/static/css/styles.css?v=2">
    {% block extra_css %}{% endblock %}
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <i class="ph-fill ph-fingerprint logo-icon"></i>
                <div class="logo-text">Virtual<br>Attendance</div>
            </div>
            
            <nav class="sidebar-nav">
                <a href="/ui/#dashboard" class="nav-item active" data-tab="dashboard">
                    <i class="ph ph-squares-four"></i> Overview
                </a>
                <a href="/ui/adms-sync-status" class="nav-item" id="navAdmsSync">
                    <i class="ph ph-arrows-clockwise"></i> ADMS Sync
                    <span id="admsSidebarBadge" style="margin-left: auto; width: 8px; height: 8px; border-radius: 50%; background: #64748b; display: inline-block;" title="Checking..."></span>
                </a>
                <a href="/ui/#devices" class="nav-item" data-tab="devices">
                    <i class="ph ph-devices"></i> Devices
                </a>
                <a href="/ui/#security" class="nav-item" data-tab="security">
                    <i class="ph ph-key"></i> API Keys
                </a>
                <a href="/ui/#geofence" class="nav-item" data-tab="geofence">
                    <i class="ph ph-map-pin"></i> Branches
                </a>
                <a href="/ui/#settings" class="nav-item" data-tab="settings">
                    <i class="ph ph-gear"></i> ADMS Config
                </a>
                <a href="/ui/#punch-types" class="nav-item" data-tab="punch-types">
                    <i class="ph ph-list-dashes"></i> Punch Types
                </a>
                <a href="/ui/#profile" class="nav-item" data-tab="profile">
                    <i class="ph ph-users"></i> Users
                </a>
                <a href="/ui/supervisors" class="nav-item">
                    <i class="ph ph-users-three"></i> Supervisors
                </a>
                <a href="/ui/help" class="nav-item">
                    <i class="ph ph-question"></i> Help & Docs
                </a>
            </nav>

            <div class="sidebar-footer">
                <a href="/logout" class="nav-item text-danger" style="color: var(--danger); margin-bottom: 1rem;">
                    <i class="ph ph-sign-out"></i> Logout
                </a>
                <div class="version-badge">Middleware v1.0</div>
            </div>
        </aside>

        <!-- Main Content -->
        <div class="main-wrapper">
            <header class="top-header">
                <div class="header-title" id="page-title">Dashboard Overview</div>
                <div class="header-actions">
                    <div class="admin-profile">
                        <i class="ph-fill ph-user-circle"></i>
                        <span>Admin</span>
                    </div>
                </div>
            </header>

            <main class="content-area">
                {% block content %}{% endblock %}
            </main>
        </div>
    </div>

    <script>
        // Simple notification helper
        function notify(message, type = 'success') {
            const toast = document.createElement('div');
            toast.style.position = 'fixed';
            toast.style.bottom = '20px';
            toast.style.right = '20px';
            toast.style.padding = '10px 20px';
            toast.style.borderRadius = '5px';
            toast.style.color = 'white';
            toast.style.background = type === 'success' ? '#10b981' : '#ef4444';
            toast.style.zIndex = '1000';
            toast.innerText = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        // Highlight active sidebar nav item based on current URL path
        document.addEventListener('DOMContentLoaded', function() {
            const path = window.location.pathname;
            const navItems = document.querySelectorAll('.nav-item');
            
            const pathMap = {
                '/ui/adms-sync-status': 'ADMS Sync',
                '/ui/supervisors': 'Supervisors',
                '/ui/help': 'Help & Docs',
            };
            
            const matchedTitle = pathMap[path];
            if (matchedTitle) {
                navItems.forEach(item => {
                    item.classList.remove('active');
                    if (item.innerText.trim() === matchedTitle) {
                        item.classList.add('active');
                    }
                });
                const titleEl = document.getElementById('page-title');
                if (titleEl) titleEl.innerText = matchedTitle;
            }

            // ── ADMS Sidebar Status Badge ──
            updateAdmsBadge();
            setInterval(updateAdmsBadge, 15000); // Poll every 15s
        });

        async function updateAdmsBadge() {
            const badge = document.getElementById('admsSidebarBadge');
            if (!badge) return;
            try {
                const res = await fetch('/ui/adms-sync-info');
                if (!res.ok) throw new Error('Not available');
                const info = await res.json();
                if (info.heartbeat_connected) {
                    badge.style.background = '#10b981'; // green = connected
                    badge.title = 'ADMS Connected';
                } else {
                    badge.style.background = '#ef4444'; // red = disconnected
                    badge.title = info.heartbeat_last_error || 'ADMS Disconnected';
                }
            } catch {
                badge.style.background = '#64748b'; // grey = unknown
                badge.title = 'Status unknown';
            }
        }
    </script>
    {% block extra_js %}{% endblock %}
</body>
</html>
